<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal template — side-by-side test</title>
  <style>
    :root {
      --rule: #E5DFD4;
      --ink: #1A1A1A;
      --muted: #7A7A7A;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: #f5f2ea;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--rule);
      background: #fff;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header p { margin: 0; font-size: 13px; color: var(--muted); }
    .controls {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .controls button {
      font: inherit;
      padding: 6px 12px;
      border: 1px solid var(--rule);
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .controls button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }
    .pane {
      position: relative;
      border-left: 1px solid var(--rule);
      background: #fff;
      overflow: hidden;
    }
    .pane:first-child { border-left: 0; }
    .pane-label {
      position: absolute;
      top: 8px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .fixture-select {
      font: inherit;
      padding: 6px 10px;
      border: 1px solid var(--rule);
      background: #fff;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>Journal template — side-by-side test</h1>
  <p>Left: committed mockup baseline. Right: generated from <code>renderJournal(fixture)</code>.</p>
  <div class="controls">
    <label style="font-size: 13px; color: var(--muted);">Fixture:
      <select class="fixture-select" id="fixture">
        <option value="walchensee">Walchensee (matches baseline)</option>
        <option value="noPhotos">No photos, no track</option>
        <option value="portraits">Portrait pairs</option>
        <option value="noGps">Photos with no GPS</option>
      </select>
    </label>
  </div>
</header>

<div class="panes">
  <div class="pane">
    <div class="pane-label">Baseline: journal-mockup.html</div>
    <iframe id="baseline" src="../docs/journal-mockup.html"></iframe>
  </div>
  <div class="pane">
    <div class="pane-label">Generated: renderJournal(fixture)</div>
    <iframe id="generated"></iframe>
  </div>
</div>
